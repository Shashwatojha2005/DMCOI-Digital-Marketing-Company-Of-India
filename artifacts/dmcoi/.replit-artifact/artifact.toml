kind = "web"
previewPath = "/"
title = "DMCOI – We Scale Attention"
version = "1.0.0"
id = "artifacts/dmcoi"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26079

[services.development]
run = "pnpm --filter @workspace/dmcoi run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dmcoi", "run", "build" ]
publicDir = "artifacts/dmcoi/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26079"
BASE_PATH = "/"
